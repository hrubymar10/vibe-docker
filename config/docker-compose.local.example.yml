# Local volume mounts — copy to docker-compose.local.yml and edit.
# Add your project directories here. Paths are mirrored (same path inside container).
# HOST_HOME is auto-detected (e.g. /home/you on Linux, /Users/you on macOS).
# This file is gitignored so your local config stays private.
services:
  vibe:
    volumes:
      - ${HOST_HOME}/projects:${HOST_HOME}/projects
      # - ${HOST_HOME}/work:${HOST_HOME}/work

# Extra environment variables — passed through from host into the container.
# Use ${VAR:-} syntax to forward host env vars (empty string if unset).
#    environment:
#      GITHUB_USER: ${GITHUB_USER:-}
#      MY_CUSTOM_VAR: ${MY_CUSTOM_VAR:-}

# Exclude patterns — hide sensitive files/dirs from the container.
# Supports glob patterns. Directories get empty read-only tmpfs overlays,
# files get /dev/null bind-mounts. vibe cannot see or read excluded paths.
# x-excludes:
#   - ${HOST_HOME}/projects/.env
#   - ${HOST_HOME}/projects/*/credentials.json
#   - ${HOST_HOME}/work/secrets/
